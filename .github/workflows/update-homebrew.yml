name: Release & Update Homebrew

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tarball
        run: |
          mkdir -p /tmp/config-master
          rsync -a --exclude='.git' --exclude='*.tar.gz' --exclude='.DS_Store' . /tmp/config-master/
          tar -czf "epicli-${{ steps.version.outputs.version }}.tar.gz" -C /tmp config-master
          rm -rf /tmp/config-master

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "epicli-${{ steps.version.outputs.version }}.tar.gz" \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}"

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(sha256sum "epicli-${{ steps.version.outputs.version }}.tar.gz" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          TAG="${{ github.ref_name }}"

          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set"
            exit 1
          fi
          echo "Token is set (${#HOMEBREW_TAP_TOKEN} chars)"

          git clone https://github.com/mainstreamer/homebrew-epicli.git
          cd homebrew-epicli
          git remote set-url origin "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/mainstreamer/homebrew-epicli.git"

          cat > Formula/epicli.rb << 'FORMULA'
          class Epicli < Formula
            desc "Shell environment manager — shortcuts, configs, and dev tools"
            homepage "https://github.com/mainstreamer/config"
            url "URL_PLACEHOLDER"
            sha256 "SHA_PLACEHOLDER"
            license "MIT"

            def install
              libexec.install Dir["*"]
              (bin/"epicli").write <<~EOS
                #!/usr/bin/env bash
                export EPICLI_HOMEBREW=1
                export DOTFILES_TARGET="#{libexec}"
                exec bash "#{libexec}/install.sh" "$@"
              EOS
            end

            def caveats
              <<~EOS
                Run 'epicli' to complete setup (install deps, create symlinks).
                Run 'epicli help' for available commands.
              EOS
            end
          end
          FORMULA
          sed -i "s|URL_PLACEHOLDER|https://github.com/mainstreamer/config/releases/download/${TAG}/epicli-${VERSION}.tar.gz|" Formula/epicli.rb
          sed -i "s|SHA_PLACEHOLDER|${SHA256}|" Formula/epicli.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/epicli.rb
          git commit -m "Update epicli to ${VERSION}"
          git push
